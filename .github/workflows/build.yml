name: Build

# Main CI: builds the solution, runs the architecture test, AOT-publishes the smoke exe on Windows +
# Linux, and publishes the desktop app. Runs on master and on the rewrite branches (next-*).

on:
  push:
    branches: [master, 'next-*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: linux-x64, os: ubuntu-latest,  rid: linux-x64 }
          - { label: win-x64,   os: windows-latest, rid: win-x64 }
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # NativeAOT links with the platform toolchain. Windows runners ship MSVC; Linux needs clang + zlib.
      - name: Install Linux AOT prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      # The subtitle stack (libass + a font), the GL/A-V smokes, and the HaPlay launch gate need native libs
      # the runners don't ship. libportaudio2 lets the app's audio module register (no devices needed).
      # libass-dev (not just libass9): LibAssLib binds [LibraryImport("ass")], so the loader probes the
      # UNVERSIONED libass.so, but libass9 ships only libass.so.9 — the -dev package adds the libass.so linker
      # symlink. (The artifact job ships its own libass.so next to the app; this is the equivalent for the
      # system-libass smoke here.)
      - name: Install libass + smoke prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libass9 libass-dev fontconfig fonts-dejavu-core ffmpeg xvfb libgl1 libgl1-mesa-dri libportaudio2 libportmidi0

      # FFmpeg.AutoGen 8.1.0 loads the VERSIONED soname (libavformat.so.62 = FFmpeg 8.x). Ubuntu's apt ffmpeg
      # is 6.1 (libavformat.so.60), so the managed decoders can't dlopen it and every avformat_* call throws
      # NotSupportedException. The artifact job already bundles BtbN's FFmpeg 8.1 shared build; stage the same
      # avcodec-62 here so the FFmpeg-backed smokes run against a matching runtime. apt ffmpeg (6.1) stays only
      # for the `ffmpeg` CLI that generates the test tone below; the versioned soname means the two never clash,
      # and appending (not prepending) keeps the app's other system natives (libass/portaudio/…) taking priority.
      - name: Stage FFmpeg 8.1 (avcodec-62) for the FFmpeg smokes
        if: runner.os == 'Linux'
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linux64-gpl-shared-8.1.tar.xz | tar xJ
          FFDIR="$PWD/ffmpeg-n8.1-latest-linux64-gpl-shared-8.1/lib"
          test -e "$FFDIR/libavformat.so.62"
          echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH:+$LD_LIBRARY_PATH:}$FFDIR" >> "$GITHUB_ENV"

      # MMD physics runs on real Bullet 3.25 via the mmd_bullet C shim (vendored in External/bullet3).
      # Build it BEFORE `dotnet build` on BOTH OSes, so S.Media.Source.MMD's csproj can stage the shared
      # library (libmmd_bullet.so / mmd_bullet.dll) into every consumer's bin — otherwise the P/Invoke in
      # the physics tests throws DllNotFoundException (Windows was missing the .dll entirely).
      - name: Build MMD Bullet physics shim (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y cmake
          MediaFramework/Native/mmd_bullet/build.sh

      - name: Build MMD Bullet physics shim (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: MediaFramework/Native/mmd_bullet/build.sh   # CMake + MSVC are preinstalled on the runner

      # --no-incremental forces a full recompile so warnings-as-errors (Directory.Build.targets, BUILD-01)
      # always evaluates every project — an "up-to-date" project can otherwise skip a warning that is now an
      # error (the incremental-build blind spot BUILD-03 called out). CI checkouts are fresh anyway; this
      # makes the guarantee explicit.
      - name: Build (Release)
        run: dotnet build MFPlayer.sln -c Release --no-incremental

      # --blame-hang: a test that never completes on the runner (device-less audio/MIDI environment) would
      # otherwise stall the job until the 6h job timeout with NO name in the log. The hang timeout kills the
      # wedged testhost and reports which tests had started-but-not-finished, turning a silent stall into an
      # actionable failure. 4 minutes ≈ 10x the slowest assembly's normal runtime — short enough that the
      # report fires before anyone cancels the job by hand (the 2026-07-02 HaPlay.Tests hang was canceled at
      # ~6 min, before the then-10m blame report could name the test).
      # RunConfiguration.MaxCpuCount=1 serializes test-ASSEMBLY execution: `dotnet test <sln>` otherwise runs
      # every test DLL in parallel, and the background composition/transport pumps in the concurrently-running
      # assemblies CPU-starve the timing-sensitive Session/Core clock tests on a 2-4 core runner (the
      # SetAllPausedAsync resume-lag + MediaClock rate flakes). Serializing gives each assembly uncontended
      # cores — the cross-assembly extension of the in-assembly DisableTestParallelization already in place.
      # --blame-hang-dump-type full: on a hang, capture a FULL process dump (managed thread stacks) of the
      # wedged testhost, not just the Sequence_*.xml. HaPlay.Tests disables parallelization, so the "test
      # running when the crash occurred" the blame reports IS the test that hung — the dump then shows WHERE it
      # is stuck. The next step uploads both on failure. Analyse locally with `dotnet-dump analyze <file>.dmp`
      # → `clrstack -all` / `pstacks`. Dumps are produced only on a hang (rare) and uploaded only on failure,
      # so green runs pay nothing.
      # These shared runners intermittently run ~30-57x slow, and NO fixed timeout survives an unbounded
      # slowdown — a single run has blown the 90s→300s connection handshake, the 4-min blame-hang, and 500ms
      # timing asserts all at once. So retry the whole invocation: the slowness fluctuates within a job (a 12s
      # assembly took ~11 min here while others took ~1s), so a fresh testhost spawn in a calmer window usually
      # passes, and a crashed/hung testhost is gone on the retry. This does NOT hide regressions — the per-test
      # hardening stays, VSTEST_CONNECTION_TIMEOUT + blame-hang still apply per attempt, and the hang dump still
      # uploads if EVERY attempt fails (steps.tests.outcome). attempts is small (a bad instance would just double
      # the wall-clock); bump it if flakes persist.
      - name: Tests (arch rules + Core/Time/Routing)
        id: tests
        shell: bash
        env:
          VSTEST_CONNECTION_TIMEOUT: '300'   # raise the testhost-connection handshake for slow startups (seconds)
        run: |
          run_tests() {
            dotnet test MFPlayer.sln -c Release --no-build \
              --blame-hang --blame-hang-timeout 4m --blame-hang-dump-type full \
              -- RunConfiguration.MaxCpuCount=1
          }
          attempts=2
          for i in $(seq 1 "$attempts"); do
            echo "::group::dotnet test (attempt $i/$attempts)"
            if run_tests; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            echo "dotnet test attempt $i failed"
            if [ "$i" -lt "$attempts" ]; then echo "retrying after transient/load failure…"; sleep 20; fi
          done
          echo "dotnet test failed after $attempts attempts"
          exit 1

      # Preserve the blame Sequence_*.xml + hang dump when the test step fails, so the hanging test and its
      # stacks survive the runner being torn down. Scoped to a tests failure so unrelated failures don't upload.
      - name: Upload test hang diagnostics
        if: ${{ failure() && steps.tests.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics-${{ matrix.rid }}
          path: '**/TestResults/**'
          if-no-files-found: ignore
          retention-days: 14

      - name: AOT-publish smoke
        run: >
          dotnet publish MediaFramework/Tools/AotSmoke/AotSmoke.csproj
          -c Release -r ${{ matrix.rid }} -p:PublishAot=true -o aot-publish

      - name: Run native AOT smoke
        shell: bash
        run: |
          if [ -f aot-publish/AotSmoke.exe ]; then bin=./aot-publish/AotSmoke.exe; else bin=./aot-publish/AotSmoke; fi
          out="$("$bin")"; rc=$?
          echo "$out"
          if [ $rc -ne 0 ]; then echo "AOT smoke exited $rc"; exit $rc; fi
          # AOT-01: the trimmed image must run Mond's runtime-error / StackFrame path — the exact code IL2026
          # flags — and report success, proving the accepted warning is detail-only, not a correctness problem.
          echo "$out" | grep -q "mond error path=error-path OK" || { echo "AOT smoke: Mond error/stack path regressed"; exit 1; }

      # The native plugin host gate: gcc-compile the C test plugin, load it, exercise every adapter. Linux only (gcc).
      - name: ABI plugin smoke
        if: runner.os == 'Linux'
        run: dotnet run --project MediaFramework/Tools/AbiSmoke/AbiSmoke.csproj -c Release --no-build

      # The unified text-subtitle path: FFmpeg decodes the .ass to ASS events, libass renders them, and the
      # smoke asserts visible pixels. Now gating — the earlier missing-library failures (2026-07-02) were the
      # FFmpeg 6.1-vs-8.1 soname mismatch, fixed by the "Stage FFmpeg 8.1" step above (avcodec-62 on
      # LD_LIBRARY_PATH); libass + fonts-dejavu-core provide the renderer and a substitute font.
      # The fixture is the small committed TestAssets/*.ass — NOT the untracked Reference/TestSubs corpus, which
      # is git-excluded and so absent on the runner (that path gave avformat_open_input ENOENT).
      - name: Subtitle decode smoke [gating]
        if: runner.os == 'Linux'
        run: >
          dotnet run --project MediaFramework/Tools/SubtitleDecodeSmoke/SubtitleDecodeSmoke.csproj
          -c Release --no-build -- MediaFramework/Tools/SubtitleDecodeSmoke/TestAssets/karaoke-timing.ass

      # PRESENT-01: the ONE gating software-GL presentation path. A native plugin GL layer surface is rendered
      # into the compositor canvas FBO on a real (Mesa llvmpipe) GL context under xvfb — proven reliable, so it
      # is a hard gate (no continue-on-error). Hardware-accelerated presentation stays optional/best-effort in
      # the launch smokes below; this guarantees the software-GL compositor path never silently regresses.
      - name: ABI GL layer-surface smoke (xvfb, software GL) [gating]
        if: runner.os == 'Linux'
        env:
          MFPLAYER_NEXT_ROOT: ${{ github.workspace }}/next
          LIBGL_ALWAYS_SOFTWARE: 1
        run: >
          xvfb-run -a dotnet run --project MediaFramework/Tools/AbiGlSmoke/AbiGlSmoke.csproj
          -c Release --no-build

      # Outbound C ABI: AOT-publish s_media_player.so, then a pure-C client drives a show through s_media_player.h.
      # The empty show is self-contained (gating); the media show opens an ffmpeg-generated clip (best-effort —
      # the runner's FFmpeg version varies). Windows deferred (AOT cross-publish + MSVC link on a Windows runner).
      - name: Outbound C-ABI smoke (s_media_player)
        if: runner.os == 'Linux'
        run: |
          PUB="$RUNNER_TEMP/smp"
          dotnet publish MediaFramework/Interop/S.Media.Interop/S.Media.Interop.csproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true -o "$PUB"
          gcc MediaFramework/Tools/SmpSmoke/smoke.c -I MediaFramework/Interop/S.Media.Interop/include "$PUB/s_media_player.so" -o "$PUB/smoke" -lpthread -Wl,-rpath,"$PUB"
          echo "--- empty show (gating) ---"
          "$PUB/smoke"
          echo "--- media show (best-effort) ---"
          if ffmpeg -nostdin -loglevel error -y -f lavfi -i "sine=frequency=440:duration=1" "$PUB/tone.wav"; then
            "$PUB/smoke" "$PUB/tone.wav" || echo "media smoke non-gating failure (FFmpeg native version?)"
          fi

      # The HaPlay launch gate (NXT-15): AOT-publish the REAL app deliverable, launch it headless, and let
      # HAPLAY_SMOKE self-exit after the first rendered frame — through the app's normal teardown
      # (ShowSession cleanup + MediaRuntime dispose), so a startup-wiring OR clean-exit regression fails CI.
      # Exit 0 = frame rendered + clean shutdown; the in-app watchdog exits 2 if no frame appears.
      - name: HaPlay AOT publish (the app deliverable)
        run: >
          dotnet publish UI/HaPlay.Desktop/HaPlay.Desktop.csproj
          -c Release -r ${{ matrix.rid }} -o haplay-publish

      # Best-effort in THIS (gate) job: it publishes without the staged native libs, so backends that need
      # them (PortAudio/PortMidi/…) can't load here — the app still starts and self-exits on the render path.
      # EXIT CRITERION (REL-02): promote to gating once a launch + backend-enumeration probe runs in the
      # `artifacts` job against the native-bundled publish (the REL-01 load-probe follow-up), or the staged
      # natives are shared into this job. The AOT publish above stays GATING (pure compile/link, no runtime deps).
      - name: HaPlay launch smoke (xvfb, HAPLAY_SMOKE self-exit)
        if: runner.os == 'Linux'
        continue-on-error: true
        timeout-minutes: 5
        env:
          HAPLAY_SMOKE: '1'
          LIBGL_ALWAYS_SOFTWARE: 1
          HAPLAY_SETTINGS_PATH: ${{ runner.temp }}/haplay-linux-settings.json
        run: xvfb-run -a ./haplay-publish/HaPlayer --media-log-level information

      # Windows runners have a service desktop; the launch there is unproven — run it best-effort until it
      # has a green history, then promote to gating (the AOT publish above IS the Windows compile gate).
      - name: HaPlay launch smoke (Windows, best-effort)
        if: runner.os == 'Windows'
        continue-on-error: true
        timeout-minutes: 5
        env:
          HAPLAY_SMOKE: '1'
          HAPLAY_SETTINGS_PATH: ${{ runner.temp }}/haplay-windows-settings.json
        run: ./haplay-publish/HaPlayer.exe --media-log-level information

  # ─────────────────────────────────────────────────────────────────────────────────────────────
  # Runnable AOT artifacts: build/stage the native libs the app P/Invokes (that don't come from
  # NuGet), AOT-publish HaPlay.Desktop, drop the natives next to the exe, and upload per platform.
  # Kept OUT of the gate job so slow/iterating native builds never block tests. NuGet already
  # provides SDL3, SkiaSharp, and (win-x64) FFmpeg via FFmpeg.GPL — those land in the publish for free.
  # Native ↔ binding versions are matched to the P/Invoke layer: portmidi 2.0.7, portaudio 19.7.0,
  # miniaudio 0.11.25, libass 0.17.5, NDI v6, FFmpeg 8.1/avcodec-62 (= FFmpeg.AutoGen 8.1.0).
  # ─────────────────────────────────────────────────────────────────────────────────────────────
  artifacts:
    name: artifact-${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: linux-x64, os: ubuntu-latest,  rid: linux-x64 }
          - { label: win-x64,   os: windows-latest, rid: win-x64 }
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install Linux AOT prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev patchelf python3 xvfb libgl1 libgl1-mesa-dri fonts-dejavu-core

      # ─── Linux natives: apt (portaudio/portmidi/libass), compiled miniaudio, DistroAV NDI, BtbN FFmpeg ───
      # apt libs go into the artifact so it's portable; their ubiquitous deps (freetype/fontconfig/alsa)
      # are assumed present on the target. FFmpeg is bundled as a fallback with $ORIGIN rpath so its
      # sibling libav* resolve from the app dir; a system FFmpeg (avcodec-62) is still preferred at load.
      - name: Stage Linux natives
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p natives-stage
          # GitHub's codeload/raw endpoints intermittently answer these native-source downloads with HTTP 429
          # (rate limit). With `set -e` and no retry, a single 429 aborts the whole artifact job (seen 2026-07-09,
          # right after the PortMidi build). Retry transient failures: curl's --retry already covers 408/429/5xx,
          # and --retry-all-errors extends it to connection-level hiccups. Downloads that feed `tar` go to a FILE
          # first (not a pipe), so a retried attempt can't concatenate a partial body into the archive.
          RETRY="--retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30"
          # PortAudio + libass come from apt (ABI-stable at these sonames). PortMidi does NOT: Ubuntu's
          # libportmidi0 is the legacy "release 217" (libportmidi.so.0), which predates the modern PortMidi 2.x
          # ABI the binding targets (Pm_CreateVirtual* etc.) and the resolver only probes .so.2/.so — so it is
          # built from source below instead. libasound2-dev is PortMidi's Linux (ALSA) build dep.
          sudo apt-get install -y cmake libasound2-dev libportaudio2 libass9
          # PortAudio ships under its SONAME (libportaudio.so.2). libass is different: LibAssLib P/Invokes the
          # BARE name "ass" (LibAssNative.cs), which .NET resolves to an unversioned libass.so — so stage the
          # system libass.so.9 under THAT single name only. Previously we shipped BOTH libass.so and libass.so.9
          # (identical 227 KB files) — an exact-content duplicate. Nothing in the bundle DT_NEEDEDs the .so.9
          # soname (libass is a leaf loaded by managed P/Invoke), so ship just libass.so and drop the twin.
          pa="$(find /usr/lib /lib -name 'libportaudio.so.2' 2>/dev/null | head -1)"
          if [ -n "$pa" ]; then cp -vL "$pa" natives-stage/; else echo "WARN: libportaudio.so.2 not found"; fi
          la="$(find /usr/lib /lib -name 'libass.so.9' 2>/dev/null | head -1)"
          if [ -n "$la" ]; then cp -vL "$la" natives-stage/libass.so; else echo "WARN: libass.so.9 not found"; fi

          # PortMidi 2.0.7 from source -> libportmidi.so.2 (matches the resolver's first candidate + the 2.x ABI).
          curl -fsSL $RETRY -o portmidi.tar.gz https://github.com/PortMidi/portmidi/archive/refs/tags/v2.0.7.tar.gz
          tar xzf portmidi.tar.gz
          cmake -S portmidi-2.0.7 -B pm-build -DBUILD_SHARED_LIBS=ON -DCMAKE_BUILD_TYPE=Release -DBUILD_JAVA_NATIVE_INTERFACE=OFF
          cmake --build pm-build --config Release
          pm="$(find pm-build \( -name 'libportmidi.so' -o -name 'libportmidi.so.*' \) -type f | head -1)"
          if [ -n "$pm" ]; then cp -vL "$pm" natives-stage/libportmidi.so.2; else echo "WARN: portmidi build produced no .so"; fi

          # miniaudio 0.11.25 — single-header, compiled to a vanilla shared lib (MALib mirrors 0.11.25).
          curl -fsSL $RETRY -o miniaudio.tar.gz https://github.com/mackron/miniaudio/archive/refs/tags/0.11.25.tar.gz
          tar xzf miniaudio.tar.gz
          printf '#define MINIAUDIO_IMPLEMENTATION\n#include "miniaudio.h"\n' > ma_impl.c
          gcc -O2 -shared -fPIC -I miniaudio-0.11.25 -o natives-stage/libminiaudio.so ma_impl.c -lpthread -lm -ldl

          # NDI v6 runtime via the DistroAV helper (accepts the NDI license non-interactively).
          # BUILD-02 (partial): this fetches from `master` — NOT immutable. Pin to a specific DistroAV commit
          # (and SHA-256 the helper) for a fully reproducible supply chain. The shipped lib's version + hash are
          # recorded in the artifact SBOM (generate-native-sbom.sh) regardless.
          curl -fsSL $RETRY https://raw.githubusercontent.com/DistroAV/DistroAV/master/CI/libndi-get.sh -o libndi-get.sh
          chmod +x libndi-get.sh
          # NDI is OPTIONAL (not in the REL-01 required manifest — licensing). The helper does its own CDN
          # download, which can also 429; under `set -e` that would abort the whole job for a non-required native.
          # Make it best-effort so a flaky NDI fetch degrades to "NDI absent" instead of failing the release.
          sudo ./libndi-get.sh install || echo "WARN: DistroAV NDI install failed (optional native — continuing)"
          p="$(find /usr /usr/local -name 'libndi.so.6' 2>/dev/null | head -1)"
          if [ -n "$p" ]; then cp -vL "$p" natives-stage/; else echo "WARN: libndi.so.6 not found"; fi

          # FFmpeg 8.1 shared (avcodec-62), bundled as the fallback for hosts without a matching system FFmpeg.
          # BUILD-02 (partial): the `latest` release tag is a rolling ref — NOT immutable. Pin to a dated BtbN
          # `autobuild-*` release URL (and verify its SHA-256) for reproducibility. The exact shipped .so hashes
          # are captured in the artifact SBOM regardless, so a build is at least auditable after the fact.
          curl -fsSL $RETRY -o ffmpeg.tar.xz https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linux64-gpl-shared-8.1.tar.xz
          tar xJf ffmpeg.tar.xz
          # BtbN ships a symlink chain per library: libavcodec.so -> libavcodec.so.62 -> libavcodec.so.62.6.100
          # (the real ~30 MB binary). The old `cp -L lib*.so.*` dereferenced BOTH the .so.62 symlink AND the
          # .so.62.6.100 real file, writing the same binary TWICE — ≈70 MB of pure duplication across the 8
          # FFmpeg libs, the bulk of the artifact bloat. Copy ONCE per library instead: `find -type f` selects
          # only the real files (skipping the symlinks), and each is staged under its SONAME (libavformat.so.62 —
          # the exact name FFmpeg.AutoGen 8.1 dlopen()s). Inter-library DT_NEEDED entries also reference the
          # SONAME, so the dropped fully-versioned twin was never loaded by anything.
          ffsrc="ffmpeg-n8.1-latest-linux64-gpl-shared-8.1/lib"
          find "$ffsrc" -maxdepth 1 -type f -name 'lib*.so.*' | while read -r real; do
            soname="$(patchelf --print-soname "$real" 2>/dev/null || true)"
            [ -n "$soname" ] || soname="$(basename "$real")"
            cp -vL "$real" "natives-stage/$soname"
          done
          for f in natives-stage/libav*.so.* natives-stage/libsw*.so.* natives-stage/libpostproc.so.*; do [ -e "$f" ] && patchelf --set-rpath '$ORIGIN' "$f" || true; done

          # MMD physics: real Bullet 3.25 via the mmd_bullet shim (vendored in External/bullet3).
          MediaFramework/Native/mmd_bullet/build.sh natives-stage
          ls -la natives-stage

      # ─── Windows natives (from source; iterate on CI — no Windows runner to pre-validate against) ───
      - name: Stage Windows natives — miniaudio + portmidi (CMake/MSVC)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p natives-stage
          # Same GitHub 429 hardening as the Linux stage: retry transient failures, download tarballs to a file
          # (not a pipe) so a retried attempt can't corrupt the archive. This step is gating (not continue-on-error).
          RETRY="--retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30"

          # miniaudio 0.11.25 -> miniaudio.dll (MA_DLL exports ma_* by name).
          curl -fsSL $RETRY -o miniaudio.tar.gz https://github.com/mackron/miniaudio/archive/refs/tags/0.11.25.tar.gz
          tar xzf miniaudio.tar.gz
          mkdir -p ma-proj && cd ma-proj
          printf '#include "miniaudio.h"\n' > impl.c
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(miniaudio C)
          add_library(miniaudio SHARED impl.c)
          target_include_directories(miniaudio PRIVATE ${CMAKE_SOURCE_DIR}/../miniaudio-0.11.25)
          target_compile_definitions(miniaudio PRIVATE MINIAUDIO_IMPLEMENTATION MA_DLL)
          EOF
          cmake -B build -A x64 . && cmake --build build --config Release
          cp -v build/Release/miniaudio.dll ../natives-stage/
          cd ..

          # PortMidi 2.0.7 -> portmidi.dll
          curl -fsSL $RETRY -o portmidi.tar.gz https://github.com/PortMidi/portmidi/archive/refs/tags/v2.0.7.tar.gz
          tar xzf portmidi.tar.gz
          cmake -S portmidi-2.0.7 -B pm-build -A x64 -DBUILD_SHARED_LIBS=ON
          cmake --build pm-build --config Release
          cp -v "$(find pm-build -name 'portmidi.dll' | head -1)" natives-stage/

      - name: Stage Windows natives — portaudio + ASIO (CMake/MSVC)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail   # NOT -e: ASIO acquisition is best-effort and must not abort the PortAudio build.
          RETRY="--retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30"   # GitHub 429 hardening
          # ASIO is an optional PortAudio host API needing Steinberg's SDK (not redistributable). Fetch it
          # best-effort and VERIFY it's actually a ZIP (PK magic) before use — Steinberg's endpoints have
          # served an HTML consent/redirect page with a 200 to the CI runner (not extractable). If ASIO is
          # unavailable PortAudio still builds with the always-present WASAPI/WDM-KS/WMME/DirectSound APIs.
          PA_ASIO=(-DPA_USE_ASIO=OFF)
          if curl.exe -fsSL "https://www.steinberg.net/asiosdk" -o asiosdk.zip && [ "$(head -c2 asiosdk.zip)" = "PK" ]; then
            powershell -NoProfile -Command "Expand-Archive -Force -Path asiosdk.zip -DestinationPath asio_sdk" || true
            # FindASIOSDK.cmake needs ASIOSDK_ROOT_DIR to be the dir that DIRECTLY contains common/asio.h.
            # The zip nests a top-level asiosdk_* folder, so resolve the root from the header — a name glob
            # ('asio*sdk*') also matched the asio_sdk wrapper dir and pointed one level too high.
            hdr="$(find asio_sdk -type f -ipath '*/common/asio.h' | head -1)"
            if [ -n "$hdr" ]; then
              asio="$(dirname "$(dirname "$hdr")")"
              PA_ASIO=(-DPA_USE_ASIO=ON "-DASIOSDK_ROOT_DIR=$PWD/$asio"); echo "ASIO SDK: $asio"
            fi
          fi
          echo "PortAudio ASIO flags: ${PA_ASIO[*]}"
          curl -fsSL $RETRY -o portaudio.tar.gz https://github.com/PortAudio/portaudio/archive/refs/tags/v19.7.0.tar.gz
          tar xzf portaudio.tar.gz
          # PortAudio 19.7.0 declares cmake_minimum_required < 3.5, which CMake 4.x removed support for
          # (-DCMAKE_POLICY_VERSION_MINIMUM=3.5 restores it). Options are PA_BUILD_SHARED / PA_BUILD_STATIC.
          cmake -S portaudio-19.7.0 -B pa-build -A x64 -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DPA_BUILD_SHARED=ON -DPA_BUILD_STATIC=OFF "${PA_ASIO[@]}"
          cmake --build pa-build --config Release
          # Output name varies across versions (portaudio.dll / portaudio_x64.dll) — normalize to portaudio.dll.
          dll="$(find pa-build -name 'portaudio*.dll' | head -1)"
          if [ -n "$dll" ]; then cp -v "$dll" natives-stage/portaudio.dll; else echo "ERROR: no portaudio dll produced"; exit 1; fi

      - name: Stage Windows natives — libass (vcpkg; pulls freetype/fribidi/harfbuzz)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          # Building libass from source on Windows needs the whole freetype/fribidi/harfbuzz tree; the meson
          # forcefallback route failed (no wraps ship with libass, and Strawberry-Perl's MinGW gcc hijacked the
          # toolchain). vcpkg (preinstalled on the runner) resolves that reliably with MSVC. vcpkg tracks
          # libass 0.17.x — ABI-compatible with the ass_* binding (LibAssLib pins no exact version).
          VCPKG="${VCPKG_INSTALLATION_ROOT:-/c/vcpkg}"; VCPKG="${VCPKG//\\//}"
          "$VCPKG/vcpkg.exe" install libass:x64-windows
          BIN="$VCPKG/installed/x64-windows/bin"
          # Bundle ass.dll + its runtime deps (freetype/harfbuzz/fribidi/png/z/brotli/...); the deps resolve
          # from the app dir. LibAssLib P/Invokes the bare name "ass", so guarantee an ass.dll is present.
          cp -v "$BIN"/*.dll natives-stage/ 2>/dev/null || true
          if [ ! -f natives-stage/ass.dll ]; then
            cand="$(find "$BIN" -maxdepth 1 \( -iname 'ass*.dll' -o -iname 'libass*.dll' \) | head -1)"
            [ -n "$cand" ] && cp -v "$cand" natives-stage/ass.dll
          fi
          ls -la natives-stage

      - name: Stage Windows natives — NDI v6 redist
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          curl.exe -fsSL https://ndi.link/NDIRedistV6 -o ndi.exe
          Start-Process -FilePath .\ndi.exe -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait
          $dll = Get-ChildItem 'C:\Program Files\NDI' -Recurse -Filter 'Processing.NDI.Lib.x64.dll' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName natives-stage\ -Verbose } else { Write-Host 'WARN: NDI DLL not found' }

      # MMD physics: real Bullet 3.25 via the mmd_bullet shim -> mmd_bullet.dll (vendored External/bullet3).
      - name: Stage Windows natives — MMD Bullet physics shim (CMake/MSVC)
        if: runner.os == 'Windows'
        shell: bash
        run: MediaFramework/Native/mmd_bullet/build.sh natives-stage

      - name: HaPlay.Desktop AOT publish
        run: >
          dotnet publish UI/HaPlay.Desktop/HaPlay.Desktop.csproj
          -c Release -r ${{ matrix.rid }} -o haplay-publish

      # NativeAOT emits standalone debug symbols that are NOT used at runtime but dominate the artifact size:
      # on linux-x64 HaPlayer.dbg is ~158 MB (2.5x the 63 MB executable), plus ~2.5 MB of managed *.pdb (unused
      # by AOT — no JIT). Shipping them would put >150 MB of dead weight in every download, duplicated across all
      # three Linux tiers. MOVE them out of the app bundle into ./debug-symbols, which is uploaded as its own
      # per-build artifact (HaPlay.Desktop-<rid>-debug-symbols) — the app downloads stay lean while the symbols
      # remain retrievable, matched to the exact build, for symbolicating an AOT crash report.
      - name: Collect + strip debug symbols
        shell: bash
        run: |
          set -euo pipefail
          before=$(du -sh haplay-publish | cut -f1)
          mkdir -p debug-symbols
          find haplay-publish -maxdepth 1 -type f \( -name '*.pdb' -o -name '*.dbg' \) -exec mv -t debug-symbols {} +
          echo "publish size: $before -> $(du -sh haplay-publish | cut -f1) (symbols moved to ./debug-symbols)"
          echo "--- debug-symbols ---"; ls -la debug-symbols

      # The SDL3-CS.Linux NuGet ships THREE identical 4.6 MB files — libSDL3.so, libSDL3.so.0, libSDL3.so.0.4.12
      # (real copies, not symlinks) — and the publish keeps all three, ~9 MB of duplication. SDL3-CS P/Invokes the
      # bare name "SDL3" with no custom resolver, so .NET's default Unix probe resolves libSDL3.so; nothing in the
      # bundle DT_NEEDEDs the versioned sonames (SDL3 is a leaf loaded by managed code). Keep libSDL3.so, drop the
      # two versioned twins. (Windows ships a single SDL3.dll — no equivalent duplication there.)
      - name: Deduplicate SDL3 native (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -fv haplay-publish/libSDL3.so.0 haplay-publish/libSDL3.so.0.4.12

      # Drop the staged natives next to the exe — the DllImport resolvers probe the app directory first.
      - name: Bundle natives into the publish
        shell: bash
        run: |
          if [ -d natives-stage ]; then cp -v natives-stage/* haplay-publish/ 2>/dev/null || true; fi
          echo "--- native libs in the artifact ---"
          ls haplay-publish/ | grep -iE '\.(dll|so)(\.[0-9]+)*$' | sort

      # ── Linux dependency tiers ──────────────────────────────────────────────────────────────────────────
      # One AOT publish + one native stage yields THREE bundles that trade portability for size. `haplay-publish`
      # is already the FULL tier (every native the app can load); derive the two reduced tiers from it here.
      #   full    — everything: Skia+HarfBuzz, SDL3, FFmpeg, PortAudio/PortMidi/miniaudio, libass, NDI, Bullet
      #             shim. Runs on any host; the REL-01/REL-02 validate + load-probe + launch gates below only
      #             ever exercise THIS bundle (the reduced tiers deliberately omit "required" natives).
      #   core    — only the render essentials that distros can't practically supply — libSkiaSharp.so and
      #             libHarfBuzzSharp.so are SkiaSharp-specific builds, not the upstream 'skia'/'harfbuzz'
      #             packages — plus the Bullet shim. Every other native is loaded from the host if present.
      #   minimal — only libmmd_bullet.so, the one native with no upstream package at all. EVERYTHING else,
      #             including libSkiaSharp/libHarfBuzzSharp, must be provided by the host (see DEPENDENCIES.txt).
      # Tiers are carved by an ALLOW-LIST (keep_only): copy the full bundle, then delete every native .so whose
      # basename is not in the tier's keep-set — so a native later added to `full` can never silently leak into
      # a reduced tier. cp -a preserves the exe's +x bit and file modes.
      - name: Build Linux dependency tiers (full / core / minimal)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          keep_only() {   # keep_only <dir> <basename>...  — drop native libs in <dir> not named in the keep-set
            local dir="$1"; shift
            local keep=" $* "
            find "$dir" -maxdepth 1 -type f \( -name '*.so' -o -name '*.so.*' \) -printf '%f\n' | while read -r b; do
              case "$keep" in *" $b "*) : ;; *) rm -f "$dir/$b" ;; esac
            done
          }

          rm -rf bundle-core bundle-minimal
          cp -a haplay-publish bundle-core
          keep_only bundle-core libSkiaSharp.so libHarfBuzzSharp.so libmmd_bullet.so
          cp -a haplay-publish bundle-minimal
          keep_only bundle-minimal libmmd_bullet.so

          # A note for the reduced tiers spelling out exactly which natives the host must supply.
          # (printf, not a heredoc: inside a YAML `run:` block every line is indented, and a heredoc terminator
          #  can't sit flush-left, so it would never close.)
          common_deps() {
            printf '%s\n' \
              "System natives loaded if present (a missing one just disables that feature):" \
              "  libSDL3.so                            SDL3 present backend        (distro pkg: sdl3 / libsdl3)" \
              "  libavcodec.so.62 + the other libav*   FFmpeg 8.x, avcodec-62 ABI  (distro FFmpeg must be 8.x)" \
              "  libportaudio.so.2                     PortAudio host              (distro pkg: libportaudio2)" \
              "  libportmidi.so.2                      PortMidi, 2.x ABI           (many distros ship only legacy 0.x)" \
              "  libminiaudio.so                       miniaudio                   (single-header — rarely packaged)" \
              "  libass.so / libass.so.9               libass subtitle renderer    (distro pkg: libass9)" \
              "  libndi.so.6                           NDI runtime                 (proprietary — not packaged)"
          }
          {
            echo "HaPlay.Desktop — linux-x64 CORE bundle"
            echo "Bundled here: libSkiaSharp.so, libHarfBuzzSharp.so, libmmd_bullet.so."
            echo "libSkiaSharp/libHarfBuzzSharp are SkiaSharp-specific builds (NOT the distro skia/harfbuzz), so"
            echo "they are bundled; libmmd_bullet.so has no upstream package. Everything below comes from the host."
            echo
            common_deps
          } > bundle-core/DEPENDENCIES.txt
          {
            echo "HaPlay.Desktop — linux-x64 MINIMAL bundle"
            echo "Bundled here: libmmd_bullet.so ONLY (the one native with no upstream package)."
            echo
            echo "REQUIRED from the host (the app will NOT render without these):"
            echo "  libSkiaSharp.so      SkiaSharp render backend  (SkiaSharp-specific build — a stock distro"
            echo "  libHarfBuzzSharp.so  HarfBuzz text shaping      usually can NOT supply these; wire them up"
            echo "                                                  yourself, e.g. from the core/full bundle)"
            echo
            common_deps
          } > bundle-minimal/DEPENDENCIES.txt

          # Provenance for the reduced tiers too (advisory; the full tier's SBOM is written by the next step).
          bash scripts/generate-native-sbom.sh ${{ matrix.rid }} bundle-core    > /dev/null || true
          bash scripts/generate-native-sbom.sh ${{ matrix.rid }} bundle-minimal > /dev/null || true

          echo "--- core tier ---";    ls bundle-core
          echo "--- minimal tier ---"; ls bundle-minimal

      # BUILD-02: record a provenance / SBOM manifest of the bundled natives (project, pinned version, source
      # URL, license, and the SHA-256 of the exact shipped file) into the artifact, so every release carries an
      # auditable record of the native code it contains. Advisory — never fails the build.
      - name: Write native SBOM (BUILD-02)
        shell: bash
        run: bash scripts/generate-native-sbom.sh ${{ matrix.rid }} haplay-publish

      # REL-01: gate the upload on a required-native manifest. The staging steps above are best-effort
      # (continue-on-error / "WARN: not found"), so without this a missing Windows/Linux native would ship
      # as a silently-broken release. check-native-manifest.sh fails here (before upload) if any library in
      # .github/native-manifest/<rid>.txt is absent from the publish dir.
      - name: Validate required natives (REL-01)
        shell: bash
        run: bash scripts/check-native-manifest.sh ${{ matrix.rid }} haplay-publish

      - name: Load-probe required natives (REL-01)
        shell: bash
        run: bash scripts/load-probe-native-manifest.sh ${{ matrix.rid }} haplay-publish

      # Run the exact directory uploaded below, after native staging + load probes. The app reports backend
      # enumeration during startup and HAPLAY_SMOKE exits only after the first rendered frame and normal teardown.
      - name: Launch uploaded Linux app + enumerate backends (REL-01/REL-02)
        if: runner.os == 'Linux'
        shell: bash
        env:
          HAPLAY_SMOKE: '1'
          LIBGL_ALWAYS_SOFTWARE: 1
          LD_LIBRARY_PATH: ${{ github.workspace }}/haplay-publish
          HAPLAY_SETTINGS_PATH: ${{ runner.temp }}/haplay-linux-settings.json
        run: |
          set -o pipefail
          out="$(timeout 60s xvfb-run -a ./haplay-publish/HaPlayer --media-log-level information 2>&1)"
          echo "$out"
          echo "$out" | grep -q "MediaRuntime ready" || { echo "backend enumeration was not reached"; exit 1; }
          echo "$out" | grep -q "HAPLAY_SMOKE: first frame rendered" || { echo "first-frame smoke was not reached"; exit 1; }

      - name: Launch uploaded Windows app + enumerate backends (REL-01/REL-02)
        if: runner.os == 'Windows'
        timeout-minutes: 2
        shell: pwsh
        env:
          HAPLAY_SMOKE: '1'
          HAPLAY_SETTINGS_PATH: ${{ runner.temp }}/haplay-windows-settings.json
        run: |
          $output = & .\haplay-publish\HaPlayer.exe --media-log-level information 2>&1 | Out-String
          Write-Host $output
          if ($LASTEXITCODE -ne 0) { throw "HaPlayer exited $LASTEXITCODE" }
          if ($output -notmatch 'MediaRuntime ready') { throw 'backend enumeration was not reached' }
          if ($output -notmatch 'HAPLAY_SMOKE: first frame rendered') { throw 'first-frame smoke was not reached' }

      # Linux uploads the three dependency tiers; the full bundle is the one the gates above validated.
      - name: Upload HaPlay.Desktop artifact (linux full)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: HaPlay.Desktop-${{ matrix.rid }}-full
          path: haplay-publish
          if-no-files-found: error
          retention-days: 14

      - name: Upload HaPlay.Desktop artifact (linux core)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: HaPlay.Desktop-${{ matrix.rid }}-core
          path: bundle-core
          if-no-files-found: error
          retention-days: 14

      - name: Upload HaPlay.Desktop artifact (linux minimal)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: HaPlay.Desktop-${{ matrix.rid }}-minimal
          path: bundle-minimal
          if-no-files-found: error
          retention-days: 14

      # Windows stays a single (full) artifact — no distro-package story, and its NuGet natives don't duplicate.
      - name: Upload HaPlay.Desktop artifact (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: HaPlay.Desktop-${{ matrix.rid }}
          path: haplay-publish
          if-no-files-found: error
          retention-days: 14

      # The debug symbols moved out of the app bundle above — one per RID, matched to this build. Kept for the
      # same window as the app artifacts so a retained build always has retrievable symbols. `warn` (not `error`)
      # because symbols are advisory: a build with none should not fail over it.
      - name: Upload debug symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaPlay.Desktop-${{ matrix.rid }}-debug-symbols
          path: debug-symbols
          if-no-files-found: warn
          retention-days: 14
