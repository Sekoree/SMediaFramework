name: Next Build

# Phase 0 gate for the parallel rewrite tree (next/). Independent of build.yml (which ships the old app
# from master). Builds the next solution, runs the architecture test, and AOT-publishes the smoke exe
# on Windows + Linux (D13).

on:
  push:
    # Glob so the gate runs on the active rewrite branch and any successor (next, next-2, next-3, …) — not just
    # the original 'next' (NXT-15: pushes to the working branch were silently skipping CI).
    branches: ['next', 'next-*']
    paths: ['next/**', '.github/workflows/next-build.yml']
  pull_request:
    paths: ['next/**', '.github/workflows/next-build.yml']
  workflow_dispatch:

concurrency:
  group: next-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: linux-x64, os: ubuntu-latest,  rid: linux-x64 }
          - { label: win-x64,   os: windows-latest, rid: win-x64 }
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # NativeAOT links with the platform toolchain. Windows runners ship MSVC; Linux needs clang + zlib.
      - name: Install Linux AOT prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      # The subtitle stack (libass + a font), the GL/A-V smokes, and the HaPlay launch gate need native libs
      # the runners don't ship. libportaudio2 lets the app's audio module register (no devices needed).
      - name: Install libass + smoke prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libass9 fontconfig fonts-dejavu-core ffmpeg xvfb libgl1 libgl1-mesa-dri libportaudio2

      - name: Build (Release)
        run: dotnet build next/MFPlayer.Next.sln -c Release

      - name: Tests (arch rules + Core/Time/Routing)
        run: dotnet test next/MFPlayer.Next.sln -c Release --no-build

      - name: AOT-publish smoke
        run: >
          dotnet publish next/MediaFramework/Tools/AotSmoke/AotSmoke.csproj
          -c Release -r ${{ matrix.rid }} -p:PublishAot=true -o aot-publish

      - name: Run native AOT smoke
        shell: bash
        run: |
          if [ -f aot-publish/AotSmoke.exe ]; then
            ./aot-publish/AotSmoke.exe
          else
            ./aot-publish/AotSmoke
          fi

      # The native plugin host gate: gcc-compile the C test plugin, load it, exercise every adapter. Linux only (gcc).
      - name: ABI plugin smoke
        if: runner.os == 'Linux'
        run: dotnet run --project next/MediaFramework/Tools/AbiSmoke/AbiSmoke.csproj -c Release --no-build

      # GATING since 2026-07-02 (NXT-15): the native deps are installed explicitly above (libass, a pinned
      # font, mesa software GL), so these paths are deterministic on the runner — a failure is a real
      # regression, not environment noise. If a runner image update ever breaks one, fix the pin rather
      # than re-adding continue-on-error.
      - name: Subtitle decode smoke
        if: runner.os == 'Linux'
        run: >
          dotnet run --project next/MediaFramework/Tools/SubtitleDecodeSmoke/SubtitleDecodeSmoke.csproj
          -c Release --no-build -- Reference/TestSubs/karaoke-timing.ass

      - name: ABI GL layer-surface smoke (xvfb, software GL)
        if: runner.os == 'Linux'
        env:
          MFPLAYER_NEXT_ROOT: ${{ github.workspace }}/next
          LIBGL_ALWAYS_SOFTWARE: 1
        run: >
          xvfb-run -a dotnet run --project next/MediaFramework/Tools/AbiGlSmoke/AbiGlSmoke.csproj
          -c Release --no-build

      # Outbound C ABI: AOT-publish s_media_player.so, then a pure-C client drives a show through s_media_player.h.
      # The empty show is self-contained (gating); the media show opens an ffmpeg-generated clip (best-effort —
      # the runner's FFmpeg version varies). Windows deferred (AOT cross-publish + MSVC link on a Windows runner).
      - name: Outbound C-ABI smoke (s_media_player)
        if: runner.os == 'Linux'
        run: |
          PUB="$RUNNER_TEMP/smp"
          dotnet publish next/MediaFramework/Interop/S.Media.Interop/S.Media.Interop.csproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true -o "$PUB"
          gcc next/MediaFramework/Tools/SmpSmoke/smoke.c -I next/MediaFramework/Interop/S.Media.Interop/include "$PUB/s_media_player.so" -o "$PUB/smoke" -Wl,-rpath,"$PUB"
          echo "--- empty show (gating) ---"
          "$PUB/smoke"
          echo "--- media show (best-effort) ---"
          if ffmpeg -nostdin -loglevel error -y -f lavfi -i "sine=frequency=440:duration=1" "$PUB/tone.wav"; then
            "$PUB/smoke" "$PUB/tone.wav" || echo "media smoke non-gating failure (FFmpeg native version?)"
          fi

      # The HaPlay launch gate (NXT-15): AOT-publish the REAL app deliverable, launch it headless, and let
      # HAPLAY_SMOKE self-exit after the first rendered frame — through the app's normal teardown
      # (ShowSession cleanup + MediaRuntime dispose), so a startup-wiring OR clean-exit regression fails CI.
      # Exit 0 = frame rendered + clean shutdown; the in-app watchdog exits 2 if no frame appears.
      - name: HaPlay AOT publish (the app deliverable)
        run: >
          dotnet publish next/UI/HaPlay.Desktop/HaPlay.Desktop.csproj
          -c Release -r ${{ matrix.rid }} -o haplay-publish

      - name: HaPlay launch smoke (xvfb, HAPLAY_SMOKE self-exit)
        if: runner.os == 'Linux'
        timeout-minutes: 5
        env:
          HAPLAY_SMOKE: '1'
          LIBGL_ALWAYS_SOFTWARE: 1
        run: xvfb-run -a ./haplay-publish/HaPlay.Desktop --media-log-level information

      # Windows runners have a service desktop; the launch there is unproven — run it best-effort until it
      # has a green history, then promote to gating (the AOT publish above IS the Windows compile gate).
      - name: HaPlay launch smoke (Windows, best-effort)
        if: runner.os == 'Windows'
        continue-on-error: true
        timeout-minutes: 5
        env:
          HAPLAY_SMOKE: '1'
        run: ./haplay-publish/HaPlay.Desktop.exe --media-log-level information
