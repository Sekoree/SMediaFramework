name: Next Build

# Phase 0 gate for the parallel rewrite tree (next/). Independent of build.yml (which ships the old app
# from master). Builds the next solution, runs the architecture test, and AOT-publishes the smoke exe
# on Windows + Linux (D13).

on:
  push:
    branches: [next]
    paths: ['next/**', '.github/workflows/next-build.yml']
  pull_request:
    paths: ['next/**', '.github/workflows/next-build.yml']
  workflow_dispatch:

concurrency:
  group: next-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: linux-x64, os: ubuntu-latest,  rid: linux-x64 }
          - { label: win-x64,   os: windows-latest, rid: win-x64 }
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # NativeAOT links with the platform toolchain. Windows runners ship MSVC; Linux needs clang + zlib.
      - name: Install Linux AOT prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      # The subtitle stack (libass + a font) and the GL/A-V smokes need native libs the runners don't ship.
      - name: Install libass + smoke prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libass9 fontconfig fonts-dejavu-core ffmpeg xvfb libgl1 libgl1-mesa-dri

      - name: Build (Release)
        run: dotnet build next/MFPlayer.Next.sln -c Release

      - name: Tests (arch rules + Core/Time/Routing)
        run: dotnet test next/MFPlayer.Next.sln -c Release --no-build

      - name: AOT-publish smoke
        run: >
          dotnet publish next/MediaFramework/Tools/AotSmoke/AotSmoke.csproj
          -c Release -r ${{ matrix.rid }} -p:PublishAot=true -o aot-publish

      - name: Run native AOT smoke
        shell: bash
        run: |
          if [ -f aot-publish/AotSmoke.exe ]; then
            ./aot-publish/AotSmoke.exe
          else
            ./aot-publish/AotSmoke
          fi

      # The native plugin host gate: gcc-compile the C test plugin, load it, exercise every adapter. Linux only (gcc).
      - name: ABI plugin smoke
        if: runner.os == 'Linux'
        run: dotnet run --project next/MediaFramework/Tools/AbiSmoke/AbiSmoke.csproj -c Release --no-build

      # Best-effort (runner FFmpeg/GL versions vary): they run + report but don't gate until proven stable on CI.
      - name: Subtitle decode smoke
        if: runner.os == 'Linux'
        continue-on-error: true
        run: >
          dotnet run --project next/MediaFramework/Tools/SubtitleDecodeSmoke/SubtitleDecodeSmoke.csproj
          -c Release --no-build -- Reference/TestSubs/karaoke-timing.ass

      - name: ABI GL layer-surface smoke (xvfb, software GL)
        if: runner.os == 'Linux'
        continue-on-error: true
        env:
          MFPLAYER_NEXT_ROOT: ${{ github.workspace }}/next
          LIBGL_ALWAYS_SOFTWARE: 1
        run: >
          xvfb-run -a dotnet run --project next/MediaFramework/Tools/AbiGlSmoke/AbiGlSmoke.csproj
          -c Release --no-build
